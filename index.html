<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Magnolia City Fall Festival</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- Required Educational Notice Banner -->
    <div class="student-banner" role="status" aria-label="Educational Notice">
        <p>
            <strong>Notice:</strong>
            This is a fictional student project for educational purposes only.
        </p>
    </div>
    <!-- End Required Educational Notice Banner -->

    <main class="festival-page">

        <header class="festival-header">

            <div class="city-presents">
                The City of Magnolia Presents:
            </div>

            <h1>1st Annual Fall Festival!</h1>

            <nav class="festival-nav" aria-label="Main navigation">
                <a href="index.html" aria-current="page">Home</a>
                <a href="Schedule.html">Schedule</a>
                <a href="Vendors.html">Vendors</a>
                <a href="artist.html">Artists</a>
                <a href="Visitor_info.html">Visitor Info</a>
                <a href="BuyTickets.html">Buy Tickets</a>
            </nav>

        </header>

        <figure class="festival-poster">
            <img
                src="Images/fall-festival-poster.png"
                
                 class="festival-section" aria-labelledby="what-heading">
            <h2 id="what-heading" class="festival-heading">What?</h2>

            <div class="festival-box">
              <p>
                Enjoy autumn in Magnolia Springs! Join us for two days of
                live music, food trucks, local vendors, family activities,
                arts and crafts, and a farmers' market.
                </p>
            </div>
        </section>

        <section class="festival-details" aria-label="Festival date and location">

            <article>
                <h2 class="festival-heading">When?</h2>

                <div class="festival-box detail-box">
                    <h3>Friday, October 11</h3>
                    <p>12:00 p.m. – 6:00 p.m.</p>

                    <h3>Saturday, October 12</h3>
                    <p>12:00 p.m. – 5:00 p.m.</p>
                </div>
            </article>

            <article>
                <h2 class="festival-heading">Where?</h2>

                <div class="festival-box detail-box">
                    <p>
                        The festival will be held at Magnolia Springs City Park
                        in Downtown Magnolia Springs.
                    </p>

                    <address>
                        1214 Park Road<br>
                        Magnolia Springs, GA 30001
                    </address>
                </div>
            </article>

        </section>

        <section class="festival-section attractions-section" aria-labelledby="attractions-heading">

            <h2 id="attractions-heading" class="festival-heading wide-heading">
                Featured Attractions
            </h2>

            <div class="attractions-grid">
                <a href="Artists.html" class="attraction-card">
                    Live Music
                </a>

                <a href="Vendors.html" class="attraction-card">
                    Food Trucks
                </a>

                <a href="Vendors.html" class="attraction-card center-attraction">
                    Arts &amp; Crafts
                </a>

                <a href="Schedule.html" class="attraction-card">
                    Games
                </a>

                <a href="Vendors.html" class="attraction-card">
                    Farmers' Market
                </a>
            </div>

        </section>

        <section class="festival-section contact-section" aria-labelledby="contact-heading">

            <h2 id="contact-heading" class="festival-heading contact-heading">
                Questions or Special Requests?
            </h2>

            <div class="festival-box contact-box">

                <p>Contact the festival team at:</p>

                <a href="mailto:fall.festival@magnoliacityga.com">
                    fall.festival@magnoliacityga.com
                </a>

            </div>

            <p class="follow-text">
                Follow the festival on social media for updates.
            </p>

            <div class="social-links">

                <a
                    href="https://www.facebook.com/"
                    target="_blank"
                    rel="noopener noreferrer"
                    aria-label="Visit Facebook homepage in a new tab">
                    Facebook
                </a>

                <a
                    href="https://www.instagram.com/"
                    target="_blank"
                    rel="noopener noreferrer"
                    aria-label="Visit Instagram homepage in a new tab">
                    Instagram
                </a>

            </div>

        </section>

        <footer class="festival-footer">
            <p>
                Copyright © Magnolia City, GA 2024 Final Project Team 2
            </p>
        </footer>

    </main>

</body>

</html>
